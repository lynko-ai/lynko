name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below.

  - type: dropdown
    id: client
    attributes:
      label: MCP Client
      description: Which AI client are you using?
      options:
        - Claude (claude.ai)
        - Claude Desktop
        - ChatGPT
        - Cursor
        - Other (specify in additional context)
    validations:
      required: true

  - type: input
    id: client-version
    attributes:
      label: Client version (if known)
      description: Version or build number of your MCP client.
      placeholder: "e.g., Claude Desktop 1.2.3"

  - type: dropdown
    id: collection-type
    attributes:
      label: Collection Type
      description: What type of collection is involved?
      options:
        - Git repository
        - Google Drive
        - Not applicable
    validations:
      required: true

  - type: dropdown
    id: failure-category
    attributes:
      label: Failure category
      description: What kind of operation failed?
      options:
        - Read / navigate (ls, toc, section, outline, grep, etc.)
        - Edit / draft (draft.edit, draft.append, draft.replace, etc.)
        - Sync (pull, collection sync, Drive sync)
        - Auth / connection (OAuth, MCP connection, permissions)
        - Commit / push
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: "When I ran `my-project.grep('TODO')`, I got an error instead of search results."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: dsl-command
    attributes:
      label: DSL command (if applicable)
      description: Paste the exact command you ran.
      render: text

  - type: textarea
    id: error-output
    attributes:
      label: Error output
      description: Paste any error message you received.
      render: text

  - type: dropdown
    id: reproducibility
    attributes:
      label: Reproducibility
      description: How consistently can you reproduce this?
      options:
        - Every time
        - Sometimes
        - Only happened once
        - Haven't retried

  - type: checkbox
    id: other-collection
    attributes:
      label: Cross-collection check
      options:
        - label: I checked whether this issue also happens on a different collection
          required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help — screenshots, steps to reproduce, workarounds tried, etc.